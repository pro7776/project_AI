```yaml
version: '3.8'

services:
  ml:
    build: ./ml
    ports:
      - "8002:8002"
    networks:
      - book-net

  api:
    build: ./api
    ports:
      - "8001:8001"
    environment:
      - ML_SERVICE_URL=http://ml:8002
    depends_on:
      - ml
    networks:
      - book-net

  web:
    build: ./web
    ports:
      - "8000:8000"
    environment:
      - API_URL=http://api:8001
    depends_on:
      - api
    networks:
      - book-net

networks:
  book-net:
    driver: bridge