{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<h1>{{ title }}</h1>

<form method="POST">
    <div class="form-group">
        <label>Логин *:</label>
        <input type="text" name="username" value="{{ user.username if user else '' }}" required>
    </div>
    <div class="form-group">
        <label>Пароль {% if not user %}*{% else %}(оставьте пустым, чтобы не менять){% endif %}:</label>
        <input type="password" name="password" {% if not user %}required{% endif %}>
    </div>
    {% if not user %}
    <div class="form-group">
        <label>Роль:</label>
        <select name="role">
            <option value="user">Пользователь</option>
            <option value="admin">Администратор</option>
        </select>
    </div>
    {% endif %}
    
    <button type="submit" class="btn-search">Сохранить</button>
    <a href="{{ url_for('admin.admin_panel') }}" class="btn">Отмена</a>
</form>
{% endblock %}
